<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TikTok Effects</title>
  <link rel="stylesheet" href="_common.css" />
</head>
<body>
  <nav>
    <a href="../index.html">&#8592; Demos</a>
    <h2>TikTok Effects</h2>
  </nav>

  <div class="stage">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="fx"></canvas>
    <div class="hud">
      <span>Pulgar arriba</span> = 🔥<br>
      <span>Paz</span> = ✨<br>
      <span>Mano abierta</span> = 💖<br>
      <span>Apuntar</span> = ⭐<br>
      <span>Rock</span> = ⚡<br>
      <span>Pistola</span> = 💥
    </div>
    <div class="status" id="status">Cargando...</div>
  </div>

  <script type="module">
    import { setupHandTracker, setupCamera, fingersUp } from './_common.js';

    const video  = document.getElementById('video');
    const canvas = document.getElementById('fx');
    const ctx    = canvas.getContext('2d');
    const status = document.getElementById('status');

    const stickers = [];

    function emojiForGesture(up) {
      const [t, i, m, r, p] = up;
      if (t && !i && !m && !r && !p) return '🔥';   // pulgar arriba
      if (!t && i && m && !r && !p) return '✨';    // paz
      if (t && i && m && r && p)    return '💖';    // mano abierta
      if (!t && i && !m && !r && !p) return '⭐';   // apuntando
      if (!t && i && !m && !r && p) return '⚡';    // rock
      if (t && i && !m && !r && !p) return '💥';    // pistola
      return null;
    }

    function spawnSticker(x, y, emoji) {
      stickers.push({
        x, y,
        vx: (Math.random() - 0.5) * 6,
        vy: -Math.random() * 6 - 4,
        rot: (Math.random() - 0.5) * 0.5,
        rotSpeed: (Math.random() - 0.5) * 0.15,
        size: 35 + Math.random() * 25,
        emoji,
        life: 1,
        scale: 0.1
      });
    }

    const lastSpawn = {}; // por mano y gesto

    let landmarker;
    async function init() {
      landmarker = await setupHandTracker(2);
      await setupCamera(video);
      status.textContent = 'Haz un gesto';
      requestAnimationFrame(loop);
    }

    function loop(now) {
      requestAnimationFrame(loop);
      if (video.readyState < 2) return;

      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.fillStyle = 'rgba(10,10,15,0.15)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const result = landmarker.detectForVideo(video, now);
      const hands  = result.landmarks || [];

      hands.forEach((lm, hi) => {
        const up = fingersUp(lm);
        const emoji = emojiForGesture(up);
        if (!emoji) {
          delete lastSpawn[hi];
          return;
        }
        // Spawn cada 100ms mientras se mantiene el gesto
        const key = `${hi}_${emoji}`;
        if (!lastSpawn[key] || now - lastSpawn[key] > 100) {
          // Centro de la palma
          const cx = ((lm[0].x + lm[9].x) / 2) * canvas.width;
          const cy = ((lm[0].y + lm[9].y) / 2) * canvas.height;
          spawnSticker(cx + (Math.random() - 0.5) * 80, cy, emoji);
          lastSpawn[key] = now;
        }
      });

      // Update y dibujar stickers
      for (let i = stickers.length - 1; i >= 0; i--) {
        const s = stickers[i];
        s.x += s.vx;
        s.y += s.vy;
        s.vy += 0.18; // gravedad ligera
        s.rot += s.rotSpeed;
        s.life -= 0.012;
        s.scale = Math.min(1, s.scale + 0.08);
        if (s.life <= 0 || s.y > canvas.height + 50) {
          stickers.splice(i, 1); continue;
        }

        ctx.save();
        ctx.translate(s.x, s.y);
        ctx.scale(-s.scale, s.scale); // espejado para legibilidad
        ctx.rotate(s.rot);
        ctx.globalAlpha = s.life;
        ctx.font = `${s.size}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = '#fff';
        ctx.shadowBlur = 10;
        ctx.fillText(s.emoji, 0, 0);
        ctx.restore();
      }
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;
    }

    init().catch(e => status.textContent = 'Error: ' + e.message);
  </script>
</body>
</html>
