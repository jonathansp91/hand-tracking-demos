<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magic Spell Caster</title>
  <link rel="stylesheet" href="_common.css" />
</head>
<body>
  <nav>
    <a href="../index.html">&#8592; Demos</a>
    <h2>Magic Spell Caster</h2>
  </nav>

  <div class="stage">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="fx"></canvas>
    <div class="hud">
      <span>Solo índice</span> arriba = trazar<br>
      <span>Mano abierta</span> = lanzar hechizo<br><br>
      ⭕ Círculo = <span>Fuego</span><br>
      ⚡ Zigzag = <span>Rayo</span><br>
      🔺 Triángulo = <span>Hielo</span><br>
      ↑ Vertical = <span>Curación</span>
    </div>
    <div class="status" id="status">Cargando...</div>
  </div>

  <script type="module">
    import { setupHandTracker, setupCamera, fingersUp } from './_common.js';

    const video  = document.getElementById('video');
    const canvas = document.getElementById('fx');
    const ctx    = canvas.getContext('2d');
    const status = document.getElementById('status');

    let landmarker;
    let trazo = [];
    let efectos = [];
    let lastModeChange = 0;

    // Reconocimiento de figuras simple
    function recognize(points) {
      if (points.length < 10) return null;

      // Bounding box
      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      points.forEach(p => {
        if (p.x < minX) minX = p.x;
        if (p.x > maxX) maxX = p.x;
        if (p.y < minY) minY = p.y;
        if (p.y > maxY) maxY = p.y;
      });
      const w = maxX - minX, h = maxY - minY;
      if (w < 50 || h < 50) return null; // muy chico

      const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
      const aspect = w / h;

      // Distancia entre primer y último punto
      const closeDist = Math.hypot(
        points[0].x - points[points.length - 1].x,
        points[0].y - points[points.length - 1].y
      );
      const isClosed = closeDist < Math.max(w, h) * 0.3;

      // Análisis de cambios de dirección (para zigzag y triángulo)
      let dirChanges = 0;
      let lastDir = 0;
      for (let i = 2; i < points.length; i++) {
        const dx = points[i].x - points[i - 2].x;
        const dy = points[i].y - points[i - 2].y;
        const dir = Math.atan2(dy, dx);
        if (i > 2 && Math.abs(dir - lastDir) > 1.2) dirChanges++;
        lastDir = dir;
      }

      // Vertical: aspect chiquito + altura grande + pocos cambios
      if (aspect < 0.4 && h > 100 && dirChanges < 3) return 'curacion';

      // Zigzag: muchos cambios de dirección sin cerrar
      if (dirChanges >= 3 && !isClosed) return 'rayo';

      // Triángulo: cerrado + 3 cambios bruscos
      if (isClosed && dirChanges >= 2 && dirChanges <= 5) return 'hielo';

      // Círculo: cerrado, aspect cercano a 1, pocos cambios bruscos
      if (isClosed && aspect > 0.6 && aspect < 1.6 && dirChanges < 4) return 'fuego';

      return null;
    }

    const SPELLS = {
      fuego:    { color: '#ff6633', icon: '🔥', name: 'FUEGO' },
      rayo:     { color: '#88ccff', icon: '⚡', name: 'RAYO' },
      hielo:    { color: '#aaeeff', icon: '❄️', name: 'HIELO' },
      curacion: { color: '#88ff99', icon: '✨', name: 'CURACIÓN' }
    };

    function castSpell(spellType, originX, originY) {
      const spell = SPELLS[spellType];
      // Diferentes efectos por hechizo
      const count = 60;
      for (let i = 0; i < count; i++) {
        const angle = (i / count) * Math.PI * 2 + Math.random() * 0.5;
        const speed = 5 + Math.random() * 8;
        efectos.push({
          x: originX, y: originY,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - (spellType === 'curacion' ? 3 : 0),
          life: 1,
          size: 4 + Math.random() * 8,
          color: spell.color,
          gravity: spellType === 'hielo' ? 0.05 : spellType === 'fuego' ? -0.1 : 0.1,
          type: spellType
        });
      }
      // Texto del hechizo
      efectos.push({
        text: spell.name,
        x: originX, y: originY - 60,
        vx: 0, vy: -2,
        life: 1.5,
        size: 32,
        color: spell.color,
        gravity: 0,
        isText: true
      });
    }

    async function init() {
      landmarker = await setupHandTracker(1);
      await setupCamera(video);
      status.textContent = 'Levanta solo el índice y traza';
      requestAnimationFrame(loop);
    }

    function loop(now) {
      requestAnimationFrame(loop);
      if (video.readyState < 2) return;

      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.fillStyle = 'rgba(10,10,15,0.25)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const result = landmarker.detectForVideo(video, now);
      const hands  = result.landmarks || [];

      if (hands.length > 0) {
        const lm = hands[0];
        const up = fingersUp(lm);
        const indexOnly = !up[0] && up[1] && !up[2] && !up[3] && !up[4];
        const allOpen = up.every(Boolean);

        if (indexOnly) {
          // Modo trazar: agregar punto
          const x = lm[8].x * canvas.width;
          const y = lm[8].y * canvas.height;
          trazo.push({ x, y });
          if (trazo.length > 200) trazo.shift();
          status.textContent = '✏️ Trazando... ' + trazo.length + ' puntos';
        } else if (allOpen && trazo.length > 10 && now - lastModeChange > 500) {
          // Modo lanzar
          const spellType = recognize(trazo);
          const palmX = ((lm[0].x + lm[9].x) / 2) * canvas.width;
          const palmY = ((lm[0].y + lm[9].y) / 2) * canvas.height;

          if (spellType) {
            castSpell(spellType, palmX, palmY);
            status.textContent = '🪄 ' + SPELLS[spellType].name + '!';
          } else {
            status.textContent = '❌ No reconocí el hechizo';
          }
          trazo = [];
          lastModeChange = now;
        } else if (!indexOnly && trazo.length > 0 && now - lastModeChange > 1500) {
          status.textContent = 'Mano abierta para lanzar';
        }
      }

      // Render trazo (con glow)
      if (trazo.length > 1) {
        ctx.strokeStyle = '#ffcc00';
        ctx.shadowColor = '#ffcc00';
        ctx.shadowBlur = 25;
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(trazo[0].x, trazo[0].y);
        for (let i = 1; i < trazo.length; i++) {
          ctx.lineTo(trazo[i].x, trazo[i].y);
        }
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Punto final brillante
        const last = trazo[trazo.length - 1];
        const grad = ctx.createRadialGradient(last.x, last.y, 0, last.x, last.y, 25);
        grad.addColorStop(0, 'rgba(255,255,200,1)');
        grad.addColorStop(1, 'rgba(255,200,80,0)');
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(last.x, last.y, 25, 0, Math.PI * 2); ctx.fill();
      }

      // Render efectos
      ctx.globalCompositeOperation = 'lighter';
      for (let i = efectos.length - 1; i >= 0; i--) {
        const e = efectos[i];
        e.x += e.vx; e.y += e.vy;
        e.vy += e.gravity || 0;
        e.life -= 0.018;
        if (e.life <= 0) { efectos.splice(i, 1); continue; }

        if (e.isText) {
          ctx.save();
          ctx.scale(-1, 1);
          ctx.globalAlpha = e.life;
          ctx.font = `bold ${e.size}px system-ui`;
          ctx.fillStyle = e.color;
          ctx.shadowColor = e.color;
          ctx.shadowBlur = 20;
          ctx.textAlign = 'center';
          ctx.fillText(e.text, -e.x, e.y);
          ctx.restore();
        } else {
          ctx.globalAlpha = e.life * 0.9;
          ctx.fillStyle = e.color;
          ctx.shadowColor = e.color;
          ctx.shadowBlur = 12;
          ctx.beginPath(); ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2); ctx.fill();
        }
      }
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
      ctx.shadowBlur = 0;
    }

    init().catch(e => status.textContent = 'Error: ' + e.message);
  </script>
</body>
</html>
