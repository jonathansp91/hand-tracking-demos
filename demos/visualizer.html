<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hand Visualizer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; color: #e0e0e0; font-family: system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    nav {
      padding: 0.75rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      border-bottom: 1px solid #1e1e2e;
      flex-shrink: 0;
    }
    nav a { color: #555; text-decoration: none; font-size: 0.85rem; }
    nav a:hover { color: #00d4ff; }
    nav h2 { font-size: 1rem; font-weight: 600; color: #fff; flex: 1; }

    .stage {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    video, canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }

    video { transform: scaleX(-1); }
    canvas { transform: scaleX(-1); }

    .hud {
      position: absolute;
      top: 1rem; right: 1rem;
      background: #0a0a0fcc;
      border: 1px solid #1e1e2e;
      border-radius: 12px;
      padding: 1rem;
      font-size: 0.8rem;
      min-width: 160px;
      backdrop-filter: blur(8px);
    }

    .hud-row { display: flex; justify-content: space-between; gap: 1rem; margin-bottom: 0.4rem; color: #666; }
    .hud-row span:last-child { color: #00d4ff; font-weight: 600; }

    .status {
      position: absolute;
      bottom: 1rem; left: 50%;
      transform: translateX(-50%);
      background: #0a0a0fcc;
      border: 1px solid #1e1e2e;
      border-radius: 20px;
      padding: 0.5rem 1.25rem;
      font-size: 0.8rem;
      color: #555;
      backdrop-filter: blur(8px);
      white-space: nowrap;
    }

    .cam-btn {
      background: #111118;
      border: 1px solid #1e1e2e;
      color: #aaa;
      padding: 0.4rem 0.85rem;
      border-radius: 8px;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .cam-btn:hover { border-color: #00d4ff44; color: #00d4ff; }
  </style>
</head>
<body>

  <nav>
    <a href="../index.html">&#8592; Demos</a>
    <h2>Hand Visualizer</h2>
    <button class="cam-btn" id="camBtn">Voltear cam</button>
  </nav>

  <div class="stage">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div class="hud">
      <div class="hud-row"><span>Manos</span><span id="handCount">0</span></div>
      <div class="hud-row"><span>FPS</span><span id="fps">0</span></div>
      <div class="hud-row"><span>Modelo</span><span>Lite</span></div>
    </div>

    <div class="status" id="status">Cargando modelo...</div>
  </div>

  <script type="module">
    import { HandLandmarker, FilesetResolver } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs';

    const video   = document.getElementById('video');
    const canvas  = document.getElementById('canvas');
    const ctx     = canvas.getContext('2d');
    const status  = document.getElementById('status');
    const fpsEl   = document.getElementById('fps');
    const countEl = document.getElementById('handCount');
    const camBtn  = document.getElementById('camBtn');

    let landmarker, facingMode = 'user', lastTime = 0, frameCount = 0, fps = 0;

    const CONNECTIONS = [
      [0,1],[1,2],[2,3],[3,4],
      [0,5],[5,6],[6,7],[7,8],
      [0,9],[9,10],[10,11],[11,12],
      [0,13],[13,14],[14,15],[15,16],
      [0,17],[17,18],[18,19],[19,20],
      [5,9],[9,13],[13,17]
    ];

    async function init() {
      const vision = await FilesetResolver.forVisionTasks(
        'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
      );
      landmarker = await HandLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
          delegate: 'GPU'
        },
        runningMode: 'VIDEO',
        numHands: 2
      });
      await startCam();
      status.textContent = 'Muestra tu mano';
      requestAnimationFrame(detect);
    }

    async function startCam() {
      if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } }
      });
      video.srcObject = stream;
      await new Promise(r => video.onloadedmetadata = r);
    }

    camBtn.onclick = async () => {
      facingMode = facingMode === 'user' ? 'environment' : 'user';
      await startCam();
    };

    function detect(now) {
      requestAnimationFrame(detect);
      if (video.readyState < 2) return;

      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;

      frameCount++;
      if (now - lastTime >= 1000) {
        fps = frameCount;
        frameCount = 0;
        lastTime = now;
        fpsEl.textContent = fps;
      }

      const result = landmarker.detectForVideo(video, now);
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const hands = result.landmarks || [];
      countEl.textContent = hands.length;
      if (hands.length === 0) status.textContent = 'Muestra tu mano';
      else status.textContent = hands.length === 1 ? '1 mano detectada' : '2 manos detectadas';

      hands.forEach((lm, hi) => {
        const hue = hi === 0 ? 195 : 270;

        CONNECTIONS.forEach(([a, b]) => {
          ctx.beginPath();
          ctx.moveTo(lm[a].x * canvas.width, lm[a].y * canvas.height);
          ctx.lineTo(lm[b].x * canvas.width, lm[b].y * canvas.height);
          ctx.strokeStyle = `hsla(${hue},100%,60%,0.6)`;
          ctx.lineWidth = 2;
          ctx.stroke();
        });

        lm.forEach((pt, i) => {
          const x = pt.x * canvas.width;
          const y = pt.y * canvas.height;
          const r = i === 0 ? 8 : 5;
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fillStyle = i === 0 ? `hsl(${hue},100%,60%)` : '#fff';
          ctx.fill();
          ctx.strokeStyle = `hsl(${hue},100%,60%)`;
          ctx.lineWidth = 1.5;
          ctx.stroke();
        });
      });
    }

    init().catch(e => { status.textContent = 'Error: ' + e.message; });
  </script>
</body>
</html>
