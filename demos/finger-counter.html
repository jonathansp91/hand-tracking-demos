<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finger Counter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; color: #e0e0e0; font-family: system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    nav {
      padding: 0.75rem 1.25rem;
      display: flex; align-items: center; gap: 1rem;
      border-bottom: 1px solid #1e1e2e; flex-shrink: 0;
    }
    nav a { color: #555; text-decoration: none; font-size: 0.85rem; }
    nav a:hover { color: #00d4ff; }
    nav h2 { font-size: 1rem; font-weight: 600; color: #fff; flex: 1; }

    .stage { flex: 1; position: relative; overflow: hidden; }
    video, canvas {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; object-fit: cover;
    }
    video { transform: scaleX(-1); }
    canvas { transform: scaleX(-1); }

    .count-display {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(5rem, 20vw, 10rem);
      font-weight: 900;
      background: linear-gradient(135deg, #00d4ff, #7b2fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      pointer-events: none;
      text-shadow: none;
      transition: transform 0.1s;
    }

    .gesture-badge {
      position: absolute;
      top: 1rem; left: 50%;
      transform: translateX(-50%);
      background: #0a0a0fcc;
      border: 1px solid #00d4ff33;
      border-radius: 20px;
      padding: 0.4rem 1.25rem;
      font-size: 0.9rem;
      color: #00d4ff;
      font-weight: 600;
      backdrop-filter: blur(8px);
      transition: opacity 0.3s;
    }

    .status {
      position: absolute;
      bottom: 1rem; left: 50%;
      transform: translateX(-50%);
      background: #0a0a0fcc;
      border: 1px solid #1e1e2e;
      border-radius: 20px;
      padding: 0.5rem 1.25rem;
      font-size: 0.8rem;
      color: #555;
      backdrop-filter: blur(8px);
      white-space: nowrap;
    }

    .cam-btn {
      background: #111118; border: 1px solid #1e1e2e;
      color: #aaa; padding: 0.4rem 0.85rem;
      border-radius: 8px; font-size: 0.8rem; cursor: pointer;
    }
    .cam-btn:hover { border-color: #00d4ff44; color: #00d4ff; }
  </style>
</head>
<body>

  <nav>
    <a href="../index.html">&#8592; Demos</a>
    <h2>Finger Counter</h2>
    <button class="cam-btn" id="camBtn">Voltear cam</button>
  </nav>

  <div class="stage">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div class="count-display" id="countDisplay">0</div>
    <div class="gesture-badge" id="gestureBadge"></div>
    <div class="status" id="status">Cargando modelo...</div>
  </div>

  <script type="module">
    import { HandLandmarker, FilesetResolver } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs';

    const video        = document.getElementById('video');
    const canvas       = document.getElementById('canvas');
    const ctx          = canvas.getContext('2d');
    const status       = document.getElementById('status');
    const countDisplay = document.getElementById('countDisplay');
    const gestureBadge = document.getElementById('gestureBadge');
    const camBtn       = document.getElementById('camBtn');

    let landmarker, facingMode = 'user';

    const CONNECTIONS = [
      [0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],
      [0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],
      [0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]
    ];

    // Pulgar usa distancia al wrist: si tip está más lejos que IP, está extendido.
    // Más robusto que comparar X porque no depende de left/right hand ni orientación.
    function dist(a, b) {
      const dx = a.x - b.x, dy = a.y - b.y;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function thumbExtended(lm) {
      // Distancia del thumb tip al index MCP, normalizada por ancho de palma
      // Puño: thumb tip pegado al nudillo del índice → ratio bajo
      // Extendido: thumb tip lejos lateralmente → ratio alto
      const palmWidth    = dist(lm[5], lm[17]);
      const thumbToIndex = dist(lm[4], lm[5]);
      return thumbToIndex / palmWidth > 0.7;
    }

    function fingersUp(lm) {
      const tips   = [4, 8, 12, 16, 20];
      const joints = [3, 6, 10, 14, 18];
      const up = [thumbExtended(lm)];
      for (let i = 1; i < 5; i++) up.push(lm[tips[i]].y < lm[joints[i]].y);
      return up;
    }

    function countFingers(lm) {
      return fingersUp(lm).filter(Boolean).length;
    }

    function detectGesture(lm, count) {
      const up = fingersUp(lm);
      if (count === 0)  return 'Puno cerrado';
      if (count === 5)  return 'Mano abierta';
      if (up[0] && !up[1] && !up[2] && !up[3] && !up[4]) return 'Pulgar arriba';
      if (!up[0] && up[1] && up[2] && !up[3] && !up[4]) return 'Paz / Victoria';
      if (!up[0] && up[1] && !up[2] && !up[3] && up[4]) return 'Rock & Roll';
      if (!up[0] && up[1] && !up[2] && !up[3] && !up[4]) return 'Apuntando';
      if (up[0] && up[1] && !up[2] && !up[3] && !up[4]) return 'Pistola';
      if (up[0] && !up[1] && !up[2] && !up[3] && up[4]) return 'Llamame';
      return '';
    }

    async function init() {
      const vision = await FilesetResolver.forVisionTasks(
        'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
      );
      landmarker = await HandLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
          delegate: 'GPU'
        },
        runningMode: 'VIDEO',
        numHands: 2
      });
      await startCam();
      await checkCameras();
      status.textContent = 'Muestra tu mano';
      requestAnimationFrame(detect);
    }

    async function startCam() {
      if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } }
      });
      video.srcObject = stream;
      await new Promise(r => video.onloadedmetadata = r);
    }

    async function checkCameras() {
      const devices = await navigator.mediaDevices.enumerateDevices();
      const cams = devices.filter(d => d.kind === 'videoinput');
      if (cams.length < 2) camBtn.style.display = 'none';
    }

    camBtn.onclick = async () => {
      const prev = facingMode;
      facingMode = facingMode === 'user' ? 'environment' : 'user';
      try {
        await startCam();
      } catch (e) {
        facingMode = prev;
        await startCam();
        status.textContent = 'No hay otra camara';
        setTimeout(() => status.textContent = '', 2000);
      }
    };

    function detect(now) {
      requestAnimationFrame(detect);
      if (video.readyState < 2) return;

      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;

      const result = landmarker.detectForVideo(video, now);
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const hands = result.landmarks || [];

      if (hands.length === 0) {
        countDisplay.textContent = '';
        gestureBadge.textContent = '';
        status.textContent = 'Muestra tu mano';
        return;
      }

      status.textContent = '';

      // Usar primera mano para el contador principal
      const lm = hands[0];
      const count = countFingers(lm);
      const gesture = detectGesture(lm, count);

      countDisplay.textContent = count;
      gestureBadge.textContent = gesture;

      // Dibujar skeleton de todas las manos
      hands.forEach((lm, hi) => {
        const hue = hi === 0 ? 195 : 270;
        CONNECTIONS.forEach(([a, b]) => {
          ctx.beginPath();
          ctx.moveTo(lm[a].x * canvas.width, lm[a].y * canvas.height);
          ctx.lineTo(lm[b].x * canvas.width, lm[b].y * canvas.height);
          ctx.strokeStyle = `hsla(${hue},100%,60%,0.5)`;
          ctx.lineWidth = 2; ctx.stroke();
        });
        lm.forEach((pt, i) => {
          ctx.beginPath();
          ctx.arc(pt.x * canvas.width, pt.y * canvas.height, i === 0 ? 7 : 4, 0, Math.PI * 2);
          ctx.fillStyle = i === 0 ? `hsl(${hue},100%,60%)` : '#ffffff99';
          ctx.fill();
        });
      });
    }

    init().catch(e => { status.textContent = 'Error: ' + e.message; });
  </script>
</body>
</html>
